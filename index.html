<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GANG LINEUP - MOBILE READY</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@200;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-image: url('https://media.discordapp.net/attachments/1460945457864769679/1462401979723808839/file_00000000b96071fa936bc0f3b3334590.png?ex=69a56e7a&is=69a41cfa&hm=005aaa46f6c3d95e2bb5cd339376d55598dc1578297fe8781858c5d00b3e93c9&=&format=webp&quality=lossless&width=525&height=350');
        }
        body {
            font-family: 'Kanit', sans-serif;
            background: #000; color: #fff;
            min-height: 100vh; margin: 0;
            overflow-x: hidden; /* ยอมให้ scroll แนวตั้งได้ในมือถือ */
        }

        /* Background Layers */
        .bg-overlay {
            position: fixed; inset: 0;
            background-image: var(--bg-image);
            background-size: cover; background-position: center;
            filter: brightness(0.15) blur(12px);
            z-index: -2; transform: scale(1.1);
        }
        .bg-gradient-animate {
            position: fixed; inset: 0; z-index: -1;
            background: linear-gradient(-45deg, #000000, #ffffff18, #ffffff27, #000000);
            background-size: 400% 400%;
            animation: gradientFlow 15s ease infinite;
            opacity: 0.6;
        }
        @keyframes gradientFlow {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* Pitch UI */
        .pitch-zone {
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            padding: 30px 0; position: relative;
        }
        .pitch-zone::after {
            content: attr(data-label);
            position: absolute; top: 10px; left: 50%;
            transform: translateX(-50%);
            font-size: 0.55rem; letter-spacing: 0.4em;
            text-transform: uppercase; color: rgba(255, 255, 255, 0.15);
        }

        /* Card Animation */
        @keyframes dropIn {
            from { opacity: 0; transform: translateY(-15px) scale(0.95); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }
        .member-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.3s ease;
            animation: dropIn 0.4s ease forwards;
            cursor: pointer;
        }
        .member-card:hover {
            background: #fff; color: #000;
            transform: scale(1.05);
        }

        /* Notifications */
        #notification-container { position: fixed; top: 15px; right: 15px; z-index: 9999; }
        .toast { background: #fff; color: #000; padding: 10px 20px; border-radius: 4px; font-weight: 600; font-size: 0.75rem; animation: slideIn 0.3s ease forwards; }
        @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        
        /* Modal Overlay */
        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.92); backdrop-filter: blur(10px); display: none; align-items: center; justify-content: center; z-index: 10000; padding: 20px; }
    </style>
</head>
<body>
    <div class="bg-overlay"></div>
    <div class="bg-gradient-animate"></div>

    <header class="pt-12 pb-6 text-center lg:pr-[300px]">
        <h1 class="text-2xl md:text-3xl font-extralight tracking-[1.2rem] md:tracking-[1.5rem] uppercase italic">GANG LINEUP</h1>
        <p id="total-members" class="text-[9px] tracking-[0.3em] text-white/30 mt-2">TOTAL MEMBERS: 0</p>
    </header>

    <main class="container mx-auto px-4 lg:pr-[320px] max-w-5xl">
        
        <div class="border-x border-white/5 pb-20">
            <section id="front" class="pitch-zone border-t-0" data-label="— ATTACK —">
                <div class="flex flex-wrap justify-center gap-4 member-list min-h-[100px] pt-6 px-4"></div>
            </section>

            <section class="pitch-zone relative overflow-hidden" data-label="— CENTER —">
                <div class="absolute inset-0 flex items-center justify-center opacity-[0.03] pointer-events-none">
                    <div class="w-48 h-48 md:w-64 md:h-64 border-2 border-white rounded-full"></div>
                </div>
                
                <div class="grid grid-cols-1 md:grid-cols-3 gap-6 relative z-10 pt-8 px-4">
                    <div id="left" class="member-list flex flex-col items-center gap-4"></div>
                    <div id="center" class="member-list flex flex-col items-center gap-4 border-y md:border-y-0 md:border-x border-white/10 py-6 md:py-0 px-4"></div>
                    <div id="right" class="member-list flex flex-col items-center gap-4"></div>
                </div>
            </section>

            <section id="back" class="pitch-zone border-b border-white/5" data-label="— SUPPORT —">
                <div class="flex flex-wrap justify-center gap-4 member-list min-h-[100px] pt-6 pb-4 px-4"></div>
            </section>
        </div>

        <aside class="lg:fixed lg:right-6 lg:top-1/2 lg:-translate-y-1/2 w-full lg:w-[280px] z-[100] mt-10 lg:mt-0 mb-20 lg:mb-0">
            <div class="glass-card p-6 md:p-8 rounded-3xl border border-white/10 backdrop-blur-2xl bg-white/5 shadow-2xl">
                <p class="text-[9px] text-center tracking-[0.4em] text-white/30 mb-8 uppercase font-semibold">Manage Team</p>
                <div class="space-y-6">
                    <input type="text" id="member-name" placeholder="ชื่อสมาชิก..." autocomplete="off"
                        class="w-full bg-transparent text-center text-lg md:text-xl outline-none placeholder:text-white/10 font-light border-b border-white/10 pb-2 focus:border-white transition">
                    
                    <select id="member-pos" class="w-full bg-black/60 text-[10px] uppercase tracking-[0.2em] p-4 rounded-xl border border-white/10 outline-none appearance-none text-center">
                        <option value="front">โซน: หน้า (ATTACK)</option>
                        <option value="left">โซน: ซ้าย (LEFT)</option>
                        <option value="center">โซน: กลาง (CENTER)</option>
                        <option value="right">โซน: ขวา (RIGHT)</option>
                        <option value="back">โซน: หลัง (SUPPORT)</option>
                    </select>

                    <button onclick="addMember()" class="w-full bg-white text-black py-4 rounded-xl text-[10px] font-bold uppercase tracking-widest hover:bg-gray-200 active:scale-95 transition shadow-lg">
                        Add Member
                    </button>

                    <div class="pt-6 border-t border-white/5 flex justify-center">
                        <button onclick="openClearModal()" class="text-[8px] uppercase tracking-[0.4em] text-red-500/40 hover:text-red-500 transition-colors py-2 px-4 rounded-full border border-red-500/10 hover:border-red-500/30">
                            Reset Pitch
                        </button>
                    </div>
                </div>
            </div>
        </aside>
    </main>

    <div id="delete-modal" class="modal-overlay">
        <div class="text-center w-full max-w-sm">
            <p class="text-[10px] uppercase tracking-widest text-white/40 mb-2">Remove Member</p>
            <h3 id="target-name" class="text-2xl md:text-3xl font-bold mb-10 tracking-tighter">NAME</h3>
            <div class="flex flex-col sm:flex-row gap-4 justify-center">
                <button onclick="closeModal()" class="text-[9px] uppercase tracking-widest text-white/40 border border-white/10 px-8 py-3 rounded-full hover:text-white transition order-2 sm:order-1">Go Back</button>
                <button id="confirm-delete-btn" class="text-[10px] uppercase tracking-widest bg-red-600 text-white px-8 py-3 rounded-full hover:bg-red-500 transition order-1 sm:order-2">Delete</button>
            </div>
        </div>
    </div>

    <div id="clear-all-modal" class="modal-overlay">
        <div class="text-center p-8 bg-black/80 rounded-3xl border border-white/10 max-w-xs">
            <h3 class="text-lg font-bold mb-8 tracking-widest uppercase">Clear Pitch?</h3>
            <div class="flex flex-col gap-4">
                <button onclick="clearAllData()" class="bg-white text-black py-3 rounded-full text-[10px] font-bold uppercase tracking-widest">Wipe Data</button>
                <button onclick="closeClearModal()" class="text-[10px] uppercase text-white/30 hover:text-white transition">Cancel</button>
            </div>
        </div>
    </div>

    <div id="notification-container"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, deleteDoc, doc, getDocs, writeBatch } 
        from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAvk7JEt3H2SQhn8Zs3sr6XaklJ78yfVI8",
            authDomain: "story-24626.firebaseapp.com",
            projectId: "story-24626",
            storageBucket: "story-24626.firebasestorage.app",
            messagingSenderId: "179493309639",
            appId: "1:179493309639:web:c5c5abcfc08e8444a202e2"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const membersRef = collection(db, "members");

        // Helper Functions
        const showNotify = (msg) => {
            const container = document.getElementById('notification-container');
            const toast = document.createElement('div');
            toast.className = `toast`;
            toast.innerText = msg.toUpperCase();
            container.appendChild(toast);
            setTimeout(() => { toast.style.opacity = '0'; setTimeout(() => toast.remove(), 500); }, 2000);
        };

        // Security
        document.addEventListener('contextmenu', e => e.preventDefault());
        document.addEventListener('keydown', e => {
            if ((e.ctrlKey || e.metaKey) && ['s','u'].includes(e.key.toLowerCase())) e.preventDefault();
            if (e.key === 'F12' || (e.ctrlKey && e.shiftKey && ['I','J','C'].includes(e.key))) e.preventDefault();
        });

        // App Logic
        window.addMember = async () => {
            const nameEl = document.getElementById('member-name');
            const posEl = document.getElementById('member-pos');
            if(!nameEl.value.trim()) return;
            await addDoc(membersRef, { name: nameEl.value.trim(), position: posEl.value, createdAt: Date.now() });
            showNotify("Member Added");
            nameEl.value = '';
        };

        let deleteId = null;
        window.deleteMember = (id, name) => {
            deleteId = id;
            document.getElementById('target-name').innerText = name;
            document.getElementById('delete-modal').style.display = 'flex';
        };

        window.closeModal = () => document.getElementById('delete-modal').style.display = 'none';

        document.getElementById('confirm-delete-btn').onclick = async () => {
            if(deleteId) {
                await deleteDoc(doc(db, "members", deleteId));
                showNotify("Removed");
                closeModal();
            }
        };

        window.openClearModal = () => document.getElementById('clear-all-modal').style.display = 'flex';
        window.closeClearModal = () => document.getElementById('clear-all-modal').style.display = 'none';
        
        window.clearAllData = async () => {
            const snap = await getDocs(membersRef);
            const batch = writeBatch(db);
            snap.forEach(d => batch.delete(d.ref));
            await batch.commit();
            showNotify("Pitch Cleared");
            closeClearModal();
        };

        onSnapshot(query(membersRef, orderBy("createdAt", "asc")), (snap) => {
            document.querySelectorAll('.member-list').forEach(el => el.innerHTML = '');
            document.getElementById('total-members').innerText = `TOTAL MEMBERS: ${snap.size}`;
            snap.forEach(d => {
                const data = d.data();
                const item = `
                    <div onclick="deleteMember('${d.id}', '${data.name}')" class="member-card w-full sm:w-32 py-3 px-2 rounded-lg text-center">
                        <p class="font-medium text-[10px] tracking-widest uppercase truncate">${data.name}</p>
                    </div>
                `;
                const list = document.querySelector(`#${data.position}.member-list`) || document.querySelector(`#${data.position} .member-list`);
                if(list) list.innerHTML += item;
            });
        });
    </script>
</body>
</html>
